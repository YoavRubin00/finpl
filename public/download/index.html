<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>FinPlay — הורד עכשיו</title>
  <meta property="og:title" content="FinPlay — הורד את האפליקציה" />
  <meta property="og:description" content="למידה פיננסית מבוססת משחק. הורד עכשיו ל-iOS ולאנדרואיד." />
  <meta property="og:type" content="website" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #164e63 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
    }
    h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(180deg, #7DD3FC, #38BDF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 36px;
    }
    .loading {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 12px;
      opacity: 0;
      animation: fadeIn 0.4s 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .desktop {
      display: none;
      margin-top: 24px;
    }
    .store-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: #fff;
      color: #0a1628;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
    }
    .store-icon { font-size: 22px; }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FinPlay</h1>
    <p class="tagline">למידה פיננסית מבוססת משחק</p>

    <div id="mobile-loading">
      <div class="spinner"></div>
      <p class="loading">מעביר אותך לחנות…</p>
    </div>

    <div id="desktop" class="desktop">
      <p style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">
        הורד מהמכשיר שלך
      </p>
      <p style="font-size: 14px; color: #94a3b8; margin-bottom: 4px;">
        FinPlay זמינה ל-iOS ולאנדרואיד
      </p>
      <div class="store-buttons">
        <a class="store-btn" href="https://apps.apple.com/app/id6761650222">
          <span class="store-icon">🍎</span>
          App Store
        </a>
        <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.finplay.app">
          <span class="store-icon">▶</span>
          Google Play
        </a>
      </div>
      <p class="hint">
        או סרוק QR מהמכשיר שלך
      </p>
    </div>
  </div>

  <script>
    (function () {
      var IOS_URL = 'https://apps.apple.com/app/id6761650222';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.finplay.app';

      function getDevice() {
        var ua = navigator.userAgent || navigator.vendor || '';
        // iPad on iPadOS 13+ reports as Mac — detect via touch points
        var isIOS = /iPad|iPhone|iPod/.test(ua)
          || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) return 'ios';
        if (/android/i.test(ua)) return 'android';
        return 'desktop';
      }

      var device = getDevice();

      if (device === 'ios') {
        window.location.replace(IOS_URL);
      } else if (device === 'android') {
        window.location.replace(ANDROID_URL);
      } else {
        // Desktop — show the manual buttons
        document.getElementById('mobile-loading').style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
