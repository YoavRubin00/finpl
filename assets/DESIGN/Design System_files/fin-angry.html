  <script src="./react.development.js.הורדה" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="./react-dom.development.js.הורדה" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="./babel.min.js.הורדה" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./Fin.jsx" data-plugins="transform-react-jsx-source,om-src-id,om-text-extract" data-filename="Fin.jsx"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source,om-src-id,om-text-extract" data-filename="inline-1">
    // Angry: aggressive shake, slanted brows, wide-open shouting mouth on
    // the "yell" beats. Steam/anger puff symbols pop above his head.
    // Color of body subtly warms (red tint pulses).
    // Loop length: 3.6s
    const { useEffect, useState } = React;

    function useTime() {
      const [t, setT] = useState(0);
      useEffect(() => {
        let raf, start = performance.now();
        const tick = (now) => { setT((now - start) / 1000); raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);
      return t;
    }

    // ── Anger symbol (the classic 4-pronged "puff" mark) ──
    function AngerMark({ x, y, scale = 1, t, delay = 0, period = 1.8 }) {
      const local = ((t + delay) % period) / period;
      const op = local < 0.1 ? local / 0.1 : (local > 0.7 ? Math.max(0, 1 - (local - 0.7) / 0.3) : 1);
      const s = scale * (0.6 + 0.4 * Math.min(1, local * 4));
      const rot = local * 30;
      return (
        <g transform={`translate(${x} ${y}) rotate(${rot}) scale(${s})`} opacity={op}>
          {/* 4-pronged puff */}
          <path
            d="M 0 -16 Q 4 -10 6 -10 L 14 -14 L 10 -6 Q 12 -4 14 0 L 10 6 L 14 14 L 6 10 Q 4 12 0 16 L -6 10 L -14 14 L -10 6 Q -12 4 -14 0 L -10 -6 L -14 -14 L -6 -10 Q -4 -12 0 -16 Z"
            fill="#ef4444" stroke="#7f1d1d" strokeWidth="1.5" strokeLinejoin="round"
          />
          <circle cx="0" cy="0" r="5" fill="#ffe9b0" stroke="#7f1d1d" strokeWidth="1" />
        </g>
      );
    }

    // ── Steam puff coming out of nostrils ──
    function SteamPuff({ x, y, t, delay = 0, period = 0.9 }) {
      const local = ((t + delay) % period) / period;
      const ty = -local * 36;
      const op = (1 - local) * 0.7;
      const sc = 0.4 + local * 0.7;
      return (
        <g transform={`translate(${x} ${y + ty}) scale(${sc})`} opacity={op}>
          <ellipse cx="0" cy="0" rx="6" ry="4" fill="#f1f5f9" stroke="#94a3b8" strokeWidth="1" />
          <ellipse cx="-3" cy="-1" rx="3" ry="2.2" fill="#f8fafc" />
        </g>
      );
    }

    function Scene() {
      const t = useTime();

      // Aggressive shake at ~12hz
      const shakeX = Math.sin(t * 75) * 3.5;
      const shakeY = Math.cos(t * 71) * 2.2;

      // YELL beats: open mouth wide on a 1.8s pulse
      const yellPhase = (t % 1.8) / 1.8;
      // mouth wide open during the 0.05-0.45 portion of cycle, otherwise gritted
      const mouthOpen = yellPhase < 0.05
        ? yellPhase / 0.05
        : yellPhase < 0.45
        ? 1
        : yellPhase < 0.55
        ? 1 - (yellPhase - 0.45) / 0.1
        : 0.05; // gritted
      const mouthShape = mouthOpen > 0.5 ? "frown" : "frown";

      // Body tense — squashed and pumped up on yell beats
      const sy = 1 + (mouthOpen > 0.5 ? 0.04 : 0);
      const sx = 1 - (mouthOpen > 0.5 ? 0.02 : 0);

      // Tail thrashes back and forth
      const tailRot = Math.sin(t * 12) * 18;
      // Flipper raised, fist-style
      const flipperRot = -45 + Math.sin(t * 14) * 14;
      // Dorsal slight wiggle
      const dorsalRot = Math.sin(t * 10) * 4;

      // Body color tint pulse — red flush on yell
      const tintAlpha = mouthOpen * 0.35;

      return (
        <svg viewBox="0 0 400 400" width="100%" height="100%">
          <defs>
            <radialGradient id="rage" cx="50%" cy="50%" r="55%">
              <stop offset="0%" stopColor="#ef4444" stopOpacity={0.35} />
              <stop offset="60%" stopColor="#ef4444" stopOpacity={0.08} />
              <stop offset="100%" stopColor="#ef4444" stopOpacity={0} />
            </radialGradient>
          </defs>

          {/* rage halo behind shark, intensifies with yell */}
          <circle cx="200" cy="220" r="170" fill="url(#rage)" opacity={0.4 + mouthOpen * 0.6} />

          {/* anger marks above & beside head */}
          <AngerMark x={110} y={100} scale={1.2} t={t} delay={0} />
          <AngerMark x={170} y={75}  scale={0.95} t={t} delay={0.6} />
          <AngerMark x={235} y={95}  scale={1.1} t={t} delay={1.2} />
          <AngerMark x={75}  y={165} scale={0.85} t={t} delay={0.3} />

          {/* steam puffs from nostrils */}
          <g transform="translate(-15 -10)">
            <SteamPuff x={118 + shakeX} y={210 + shakeY} t={t} delay={0} />
            <SteamPuff x={130 + shakeX} y={208 + shakeY} t={t} delay={0.45} />
            <SteamPuff x={118 + shakeX} y={210 + shakeY} t={t} delay={0.7} />
          </g>

          {/* shake the whole shark */}
          <g transform={`translate(${shakeX} ${shakeY})`}>
            <Fin
              body={{ tx: 0, ty: 0, rot: Math.sin(t * 14) * 1.5, sx, sy }}
              tail={{ rot: tailRot }}
              dorsal={{ rot: dorsalRot }}
              flipper={{ rot: flipperRot }}
              bottomFin={{ rot: -Math.sin(t * 12) * 8 }}
              mouthOpen={mouthOpen}
              mouthShape={mouthShape}
              blink={0}
              eyebrow="angry"
              eyeScale={0.85}
              pupilDX={0}
              pupilDY={2}
              blushOpacity={0}
            />
            {/* red flush over body — multiplied for warmth */}
            <ellipse cx="200" cy="225" rx="115" ry="120" fill="#ef4444" opacity={tintAlpha} style={{mixBlendMode: 'multiply'}} />
          </g>
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Scene />);
  </script>
