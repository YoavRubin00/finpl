  <script src="./babel.min.js.הורדה" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source,om-src-id,om-text-extract" data-filename="inline-1">
    // Meditation: slow breath in/out (8s cycle), eyes softly closed,
    // cross-legged-ish posture (subtle), and ambient "om" particles
    // floating up. Fin gently bobs with each breath.
    const { useEffect, useState } = React;

    function useTime() {
      const [t, setT] = useState(0);
      useEffect(() => {
        let raf, start = performance.now();
        const tick = (now) => {
          setT((now - start) / 1000);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);
      return t;
    }

    // Smooth ease for breathing (sine)
    const breath = (t, period = 8) => {
      // returns 0..1, slow inhale (~40%), hold (~10%), slow exhale (~40%), rest (~10%)
      const phase = (t % period) / period; // 0..1
      // map with a smooth two-hump function: inhale rising, hold high, exhale falling, rest low
      if (phase < 0.4) {
        // inhale 0..1
        const p = phase / 0.4;
        return 0.5 - 0.5 * Math.cos(Math.PI * p);
      } else if (phase < 0.5) {
        return 1; // hold
      } else if (phase < 0.9) {
        const p = (phase - 0.5) / 0.4;
        return 0.5 + 0.5 * Math.cos(Math.PI * p);
      } else {
        return 0; // rest
      }
    };

    function Particle({ delay, x }) {
      // particle floats up over a 5s loop, fades in then out
      const t = useTime();
      const local = (t + delay) % 5;
      const p = local / 5;             // 0..1
      const y = 60 - p * 90;           // up
      const wobble = Math.sin(p * Math.PI * 4) * 4;
      const opacity = p < 0.15 ? p / 0.15 : (p > 0.8 ? (1 - p) / 0.2 : 1);
      const scale = 0.5 + p * 0.5;
      return (
        <g transform={`translate(${x + wobble} ${y}) scale(${scale})`} opacity={opacity * 0.85}>
          <circle r="6" fill="#a9c4dc" stroke="#5b88b3" strokeWidth="1.5" />
          <text x="0" y="3" textAnchor="middle" fontSize="7" fill="#2a4163" fontFamily="Georgia, serif">ॐ</text>
        </g>
      );
    }

    function Scene() {
      const t = useTime();
      const b = breath(t, 8);

      // Inhale: chest up, body scaleY up slightly, bob up.
      // Exhale: opposite. Closed-eye serene smile throughout.
      const sy = 1 + b * 0.06;
      const sx = 1 - b * 0.03;
      const ty = -b * 6;          // floats slightly while inhaling
      const dorsalRot = -b * 4;   // dorsal lifts on inhale
      const tailRot = -b * 5;     // tail flicks gently
      const flipperRot = -10 - Math.sin(t * 1.5) * 4; // arms forward (pseudo "lotus")
      const blushOpacity = 0.55 + b * 0.2;

      return (
        <svg viewBox="0 0 400 400" width="100%" height="100%">
          {/* meditative aura — concentric soft rings */}
          {[0,1,2].map(i => {
            const phase = (t * 0.4 + i / 3) % 1;
            const r = 60 + phase * 110;
            const op = (1 - phase) * 0.18;
            return <circle key={i} cx="200" cy="220" r={r} fill="none" stroke="#6e9bc6" strokeWidth="2" opacity={op} />;
          })}

          {/* OM particles — left and right of head */}
          <Particle delay={0} x={120} />
          <Particle delay={1.6} x={140} />
          <Particle delay={3.2} x={100} />
          <Particle delay={0.8} x={130} />

          {/* Cushion (very small, simple) */}
          <ellipse cx="200" cy="345" rx="80" ry="8" fill="#3f6691" opacity="0.45" />
          <path d="M 130 345 Q 200 360 270 345 Q 270 335 200 332 Q 130 335 130 345 Z" fill="#5b88b3" stroke="#2a4163" strokeWidth="2.5" />

          {/* Fin himself */}
          <Fin
            body={{ tx: 0, ty, rot: 0, sx, sy }}
            tail={{ rot: tailRot }}
            dorsal={{ rot: dorsalRot }}
            flipper={{ rot: flipperRot }}
            bottomFin={{ rot: 0 }}
            mouthOpen={0}
            mouthShape="smile"
            blink={1}                 // eyes closed for meditation
            eyebrow="calm"
            blushOpacity={blushOpacity}
          />
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Scene />);
  </script>
