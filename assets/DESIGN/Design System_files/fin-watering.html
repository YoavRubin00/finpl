  <script src="./react.development.js.הורדה" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="./react-dom.development.js.הורדה" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="./babel.min.js.הורדה" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./Fin.jsx" data-plugins="transform-react-jsx-source,om-src-id,om-text-extract" data-filename="Fin.jsx"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source,om-src-id,om-text-extract" data-filename="inline-1">
    // Watering: Fin tilts a watering can, droplets fall, plant pulses & grows
    // tiny on each beat. 4s loop. Cute, rewarding. Eyes look down at the plant.
    const { useEffect, useState } = React;

    function useTime() {
      const [t, setT] = useState(0);
      useEffect(() => {
        let raf, start = performance.now();
        const tick = (now) => { setT((now - start) / 1000); raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);
      return t;
    }

    // Easing
    const eoq = (t) => t * (2 - t);
    const eob = (t) => { const c1=1.70158, c3=c1+1; return 1 + c3 * Math.pow(t-1,3) + c1 * Math.pow(t-1,2); };

    // Watering can — tilted, with a spout pointing toward the plant
    function WateringCan({ tilt = 0, x = 0, y = 0 }) {
      return (
        <g transform={`translate(${x} ${y}) rotate(${tilt} 30 30)`}>
          {/* body */}
          <rect x="0" y="10" width="50" height="40" rx="6" fill="#facc15" stroke="#7c2d12" strokeWidth="2.5" />
          {/* highlight stripe */}
          <rect x="3" y="14" width="44" height="6" rx="3" fill="#fde68a" />
          {/* handle */}
          <path d="M 50 18 Q 70 18 65 35 Q 70 50 50 45" fill="none" stroke="#7c2d12" strokeWidth="3.5" strokeLinecap="round" />
          {/* spout */}
          <path d="M 0 18 L -22 8 L -22 18 L 0 30 Z" fill="#facc15" stroke="#7c2d12" strokeWidth="2.5" strokeLinejoin="round" />
          {/* spout cap */}
          <ellipse cx="-22" cy="13" rx="3.5" ry="6" fill="#7c2d12" />
        </g>
      );
    }

    // A water droplet falling from spout to plant, with a splash at the bottom
    function Droplet({ t, delay = 0, period = 0.7, fromX, fromY, toX, toY }) {
      const local = ((t + delay) % period) / period;
      // 0..0.75 = falling. 0.75..1 = splash + fade
      const falling = local < 0.75;
      const f = falling ? local / 0.75 : 1;
      const x = fromX + (toX - fromX) * f;
      const y = fromY + (toY - fromY) * f + (falling ? 0 : 0);
      const op = falling ? 1 : Math.max(0, 1 - (local - 0.75) / 0.25);
      const sc = falling ? 1 : 1 + (local - 0.75) * 4;
      return (
        <g opacity={op}>
          {falling && (
            <g transform={`translate(${x} ${y})`}>
              <path d="M 0 -6 Q 4 0 0 6 Q -4 0 0 -6 Z" fill="#7dd3fc" stroke="#0369a1" strokeWidth="1.2" strokeLinejoin="round" />
              <ellipse cx="-1.5" cy="-1.5" rx="1.2" ry="2" fill="#e0f2fe" />
            </g>
          )}
          {!falling && (
            <g transform={`translate(${toX} ${toY}) scale(${sc})`}>
              <ellipse cx="0" cy="0" rx="6" ry="2" fill="none" stroke="#0369a1" strokeWidth="1.5" />
              <ellipse cx="-7" cy="-1" rx="2" ry="1" fill="none" stroke="#0369a1" strokeWidth="1.2" />
              <ellipse cx="7" cy="-1" rx="2" ry="1" fill="none" stroke="#0369a1" strokeWidth="1.2" />
            </g>
          )}
        </g>
      );
    }

    // Sapling that grows + bobs in joy with each watering pulse
    function Sapling({ wateringPulse }) {
      // wateringPulse 0..1 — drives leaf bounce
      const sway = Math.sin(performance.now() / 600) * 1.5;
      const stemH = 24 + wateringPulse * 6;
      const leafScale = 1 + wateringPulse * 0.15;
      return (
        <g transform={`translate(280 320)`}>
          {/* pot */}
          <path d="M -28 0 L -22 38 L 22 38 L 28 0 Z" fill="#c2410c" stroke="#7c2d12" strokeWidth="2.5" strokeLinejoin="round" />
          <rect x="-30" y="-4" width="60" height="8" rx="2" fill="#9a3412" stroke="#7c2d12" strokeWidth="2.5" />
          {/* soil */}
          <ellipse cx="0" cy="-2" rx="24" ry="3" fill="#3f1d0e" />
          {/* stem */}
          <path d={`M 0 -2 Q ${sway} ${-stemH/2} 0 ${-stemH}`} stroke="#15803d" strokeWidth="3" fill="none" strokeLinecap="round" />
          {/* leaves — bottom pair */}
          <g transform={`translate(0 ${-stemH * 0.55}) scale(${leafScale})`}>
            <path d="M 0 0 Q -10 -4 -16 -10 Q -10 -2 0 0 Z" fill="#22c55e" stroke="#14532d" strokeWidth="1.5" strokeLinejoin="round" />
            <path d="M 0 0 Q 10 -4 16 -10 Q 10 -2 0 0 Z" fill="#22c55e" stroke="#14532d" strokeWidth="1.5" strokeLinejoin="round" />
          </g>
          {/* top leaf cluster */}
          <g transform={`translate(${sway} ${-stemH}) scale(${leafScale})`}>
            <circle cx="0" cy="-2" r="9" fill="#22c55e" stroke="#14532d" strokeWidth="2" />
            <circle cx="-7" cy="2" r="6" fill="#22c55e" stroke="#14532d" strokeWidth="2" />
            <circle cx="7" cy="2" r="6" fill="#22c55e" stroke="#14532d" strokeWidth="2" />
            <circle cx="-2" cy="-1" r="2" fill="#16a34a" />
          </g>
        </g>
      );
    }

    function Scene() {
      const t = useTime();

      // 4s loop: 0-1.2s lift can, 1.2-3.0s pour (water flows), 3.0-4.0s lower
      const cyc = (t % 4) / 4;
      const pouring = cyc > 0.3 && cyc < 0.75;

      // Watering can tilt: 0 → 75deg during pour
      let canTilt = 0;
      if (cyc < 0.3) canTilt = eoq(cyc / 0.3) * 75;
      else if (cyc < 0.75) canTilt = 75 + Math.sin((cyc - 0.3) * 18) * 4;
      else canTilt = 75 - eoq((cyc - 0.75) / 0.25) * 75;

      // Tiny up-down on flipper holding can
      const flipperRot = -65 - canTilt * 0.15;

      // Body lean towards plant
      const lean = 4 + Math.sin(t * 2) * 1.5;

      // Watering pulse drives the plant (only during pour)
      const wateringPulse = pouring ? (0.5 + 0.5 * Math.sin((cyc - 0.3) * 24)) : 0;

      // Eye look down-right toward plant
      const pupilDX = 3;
      const pupilDY = 4;

      // Slight blink occasionally
      const blink = (Math.sin(t * 0.9) > 0.97) ? 1 : 0;

      // Spout end position (after rotation around 30,30 in can-local coords).
      // Can is placed at translate(canX, canY); spout in local is at (-22, 13).
      // We pre-compute the world spout-tip position for droplets.
      const canX = 195, canY = 145;
      // Apply rotation around (30,30): world point = canX + R*(localX-30,localY-30) + (30,30)
      const rad = canTilt * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const lx = -22 - 30, ly = 13 - 30;
      const spoutX = canX + (lx * cos - ly * sin) + 30;
      const spoutY = canY + (lx * sin + ly * cos) + 30;

      // Plant top (target for water)
      const plantX = 280, plantY = 285;

      return (
        <svg viewBox="0 0 400 400" width="100%" height="100%">
          {/* ground shadow */}
          <ellipse cx="220" cy="358" rx="150" ry="8" fill="#0f172a" opacity="0.18" />

          {/* Fin — head turned slightly toward the plant via lean */}
          <Fin
            body={{ tx: -30, ty: 0, rot: lean, sx: 1, sy: 1 }}
            tail={{ rot: -8 + Math.sin(t * 3) * 4 }}
            dorsal={{ rot: 0 }}
            flipper={{ rot: flipperRot }}
            bottomFin={{ rot: 0 }}
            mouthOpen={0.15}
            mouthShape="smile"
            blink={blink}
            eyebrow="happy"
            pupilDX={pupilDX}
            pupilDY={pupilDY}
            blushOpacity={0.7}
          />

          {/* Watering can — held by flipper. Position tracks the flipper ~roughly. */}
          <g transform={`translate(0 0)`}>
            <WateringCan tilt={canTilt} x={canX} y={canY} />
          </g>

          {/* droplets only render during pour */}
          {pouring && (
            <>
              <Droplet t={t} delay={0.0} period={0.45} fromX={spoutX} fromY={spoutY} toX={plantX} toY={plantY} />
              <Droplet t={t} delay={0.18} period={0.45} fromX={spoutX} fromY={spoutY} toX={plantX-6} toY={plantY+2} />
              <Droplet t={t} delay={0.32} period={0.45} fromX={spoutX} fromY={spoutY} toX={plantX+5} toY={plantY-1} />
            </>
          )}

          {/* Plant */}
          <Sapling wateringPulse={wateringPulse} />

          {/* Sparkles when plant gets watered */}
          {wateringPulse > 0.6 && (
            <g opacity={(wateringPulse - 0.6) * 2.5}>
              <text x="265" y="240" fontSize="14" fill="#facc15">✦</text>
              <text x="295" y="245" fontSize="10" fill="#facc15">✦</text>
              <text x="280" y="220" fontSize="12" fill="#facc15">✦</text>
            </g>
          )}
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Scene />);
  </script>
